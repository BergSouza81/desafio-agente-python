services:
  api:
    build: .
    container_name: desafio-agente-python
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Mount do código-fonte para hot-reload em desenvolvimento
      - .:/app
      # Volume anônimo evita que a venv da máquina host sobrescreva o container
      - /app/venv
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    restart: unless-stopped

